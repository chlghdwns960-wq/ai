<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수선언 및 실행2</title>
  </head>
  <body>
    <script>
      document.write("홍길동님 환영합니다<br>");
      document.write("김철수님 환영합니다<br>");
      document.write("오영희님 환영합니다<br>");
      document.write("조진갑님 환영합니다<br>");
      document.write("<hr>");
      //   함수 선언
      function hi(name) {
        document.write(`${name}님 환영합니다 <br>`);
      }
      hi("홍길동");
      hi("김철수");
      hi("오영희");
      hi("조진갑");
    </script>
  </body>
</html>
