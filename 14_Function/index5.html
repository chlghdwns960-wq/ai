<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이름없는함수2</title>
  </head>
  <body>
    <script>
      let name = function (name) {
        document.write(`${name}님 환영합니다 <br>`);
      };
      name("홍길동");
    </script>
  </body>
</html>
