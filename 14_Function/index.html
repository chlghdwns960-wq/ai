<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수선언 및 실행</title>
  </head>
  <body>
    <script>
      // 함수를 선언 하는 방법
      function test() {
        // 함수 기능 코드
        alert("안녕하세요?");
      }
      // 만든 함수 실행 방법<호출하기>
      test();
      test();
    </script>
  </body>
</html>
