<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이름없는함수3</title>
  </head>
  <body>
    <script>
      let city = function (name, count) {
        for (let i = 1; i <= count; i++) {
          document.write(`여기는 ${name}입니다<br>`);
        }
      };
      city("제주", 10);
    </script>
  </body>
</html>
