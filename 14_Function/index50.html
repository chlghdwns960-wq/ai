<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>return문</title>
  </head>
  <body>
    <script>
      function test() {
        alert("첫번째 테스트입니다");
        // 함수를 중간에 강제적으로 중지시킬때
        return;
        alert("두번째 테스트입니다");
      }
      test();
    </script>
  </body>
</html>
