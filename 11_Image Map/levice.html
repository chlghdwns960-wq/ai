<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리바이스상품</title>
    <style>
      p {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <p id="top">
      <img src="./images/levis.jpg" alt="메인화면" usemap="#main" />
      <map name="main">
        <area
          shape="rect"
          coords="11,48,275,697"
          href="#style1"
          alt="1번스타일"
        />
        <area
          shape="rect"
          coords="286,46,567,693"
          href="#style2"
          alt="2번스타일"
        />
        <area
          shape="rect"
          coords="571,47,857,654"
          href="#style3"
          alt="3번스타일"
        />
      </map>
    </p>
    <p id="style1">
      <img src="./images/levis1.jpg" alt="1번상세페이지" usemap="#st1" />
      <map name="st1">
        <area shape="circle" coords="803,5305,42" href="#top" alt="맨위로" />
      </map>
    </p>
    <p id="style2">
      <img src="./images/levis2.jpg" alt="2번상세페이지" usemap="#st2" />
      <map name="st2">
        <area shape="circle" coords="809,6562,44" href="#top" alt="맨위로" />
      </map>
    </p>

    <p id="style3">
      <img src="./images/levis3.jpg" alt="3번상세페이지" usemap="#st3" />
      <map name="st3">
        <area shape="circle" coords="803,5945,44" href="#top" alt="맨위로" />
      </map>
    </p>
  </body>
</html>
