<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메인 비주얼 슬라이드</title>

    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-width: 1920px;
      }

      .main-visual {
        width: 1920px;
        height: 480px;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
        background: #dbe7e4;
      }

      .main-visual .swiper {
        width: 100%;
        height: 100%;
      }

      .main-visual .swiper-slide {
        width: 100%;
        height: 100%;
      }

      .main-visual .swiper-slide a {
        display: block;
        width: 100%;
        height: 100%;
      }

      .main-visual .swiper-slide img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      /* 이전/다음 버튼 */
      .mv-nav {
        position: absolute;
        left: 358px;
        bottom: 23px;
        z-index: 10;
        display: flex;
        gap: 12px;
      }

      .mv-btn {
        width: 40px;
        height: 40px;
        border: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
      }

      .mv-btn svg {
        width: 18px;
        height: 18px;
      }

      .mv-btn path {
        fill: none;
        stroke: #8f8f8f;
        stroke-width: 2.3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* 페이지 표시 1/5 */
      .mv-fraction {
        position: absolute;
        right: 363px;
        bottom: 23px;
        z-index: 10;
        min-width: 48px;
        height: 26px;
        padding: 0 10px;
        border-radius: 13px;
        background: rgba(110, 110, 110, 0.85);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        line-height: 26px;
        text-align: center;
      }

      .mv-fraction .slash {
        margin: 0 2px;
      }
    </style>
  </head>
  <body>
    <section class="main-visual">
      <div class="swiper mainVisualSwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <a href="#">
              <img src="./images/01_banner/banner.png" alt="슬라이드 1" />
            </a>
          </div>
          <div class="swiper-slide">
            <a href="#">
              <img src="./images/01_banner/banner01.png" alt="슬라이드 2" />
            </a>
          </div>
          <div class="swiper-slide">
            <a href="#">
              <img src="./images/01_banner/banner02.png" alt="슬라이드 3" />
            </a>
          </div>
          <div class="swiper-slide">
            <a href="#">
              <img src="./images/01_banner/banner03.png" alt="슬라이드 4" />
            </a>
          </div>
          <div class="swiper-slide">
            <a href="#">
              <img src="./images/01_banner/banner04.png" alt="슬라이드 5" />
            </a>
          </div>
        </div>

        <!-- 이전/다음 버튼 -->
        <div class="mv-nav">
          <button type="button" class="mv-btn mv-prev" aria-label="이전">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14.5 5.5L8 12l6.5 6.5" />
            </svg>
          </button>

          <button type="button" class="mv-btn mv-next" aria-label="다음">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9.5 5.5L16 12l-6.5 6.5" />
            </svg>
          </button>
        </div>

        <!-- 페이지 표시 -->
        <div class="mv-fraction">
          <span class="current">1</span>
          <span class="slash">/</span>
          <span class="total">5</span>
        </div>
      </div>
    </section>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script>
      const fractionCurrent = document.querySelector(".mv-fraction .current");
      const fractionTotal = document.querySelector(".mv-fraction .total");

      const mainVisualSwiper = new Swiper(".mainVisualSwiper", {
        loop: true,
        speed: 800,
        autoplay: {
          delay: 3000,
          disableOnInteraction: false,
        },
        navigation: {
          prevEl: ".mv-prev",
          nextEl: ".mv-next",
        },
        on: {
          init: function () {
            fractionTotal.textContent = 5;
            fractionCurrent.textContent = this.realIndex + 1;
          },
          slideChange: function () {
            fractionCurrent.textContent = this.realIndex + 1;
          },
        },
      });
    </script>
  </body>
</html>
