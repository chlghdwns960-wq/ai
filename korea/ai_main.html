<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국의 사계</title>
    <style>
      /* 기본 초기화 및 배경 설정 */
      body,
      html {
        margin: 0;
        padding: 0;
        background-color: #d8f58c;
        font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
        color: #000;
      }

      /* 메인 콘텐츠를 감싸는 컨테이너 */
      .container {
        width: 100%;
        max-width: 500px;
        margin: 30px auto 0 auto; /* 상단 여백 30px로 수정 및 중앙 정렬 */
        text-align: center;
      }

      /* 메인 타이틀 */
      h1 {
        font-size: 32px;
        font-weight: bold;
        margin-top: 0;
        margin-bottom: 25px;
        letter-spacing: 2px;
      }

      /* 구분선 스타일링 */
      hr.divider {
        border: 0;
        border-top: 5px solid #444; /* 두께 5px */
        width: 500px; /* 가로 500px */
        margin: 0 auto;
      }

      /* 링크들을 감싸는 네비게이션 영역 */
      .nav-links {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin: 30px 0;
      }

      /* 공통 링크 스타일 */
      .nav-links a {
        text-decoration: none;
        color: #6a0dad; /* 새 이미지 고증: 보라색 텍스트 */
        font-size: 16px;
        display: inline-block;
      }

      /* UX 향상: 링크에 마우스를 올렸을 때의 반응 */
      .nav-links a:hover {
        text-decoration: underline;
      }

      /* 하단 카피라이트 텍스트 */
      .footer-text {
        margin-top: 15px;
        font-size: 14px;
        color: #000;
      }
      a {
        text-decoration: none;
      }
      a:hover {
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 타이틀 -->
      <h1>한국의 사계</h1>

      <!-- 상단 굵은 선 -->
      <hr class="divider" />

      <!-- 링크 리스트 -->
      <nav class="nav-links">
        <a href="ai_spring.html">봄의 계절</a>
        <a href="ai_summer.html">여름의 계절</a>
        <a href="ai_autumn.html">가을의 계절</a>
        <a href="ai_winter.html">겨울의 계절</a>
      </nav>

      <!-- 하단 굵은 선 -->
      <hr class="divider" />

      <!-- 카피라이트 -->
      <p class="footer-text">Copywrite ⓒ최홍준.com 2026 All Reserved</p>
    </div>
  </body>
</html>
