<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do App</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="app" aria-label="할 일 관리 앱">
      <section class="todo-card">
        <header class="app-header">
          <h1 class="app-title">할 일 관리</h1>
          <p class="app-description">
            개인, 업무, 공부 일정을 한 곳에서 관리해보자.
          </p>
        </header>

        <section class="progress-section" aria-labelledby="progress-title">
          <div class="progress-header">
            <h2 id="progress-title" class="section-title">진행률</h2>
            <strong id="progressText" class="progress-text">0%</strong>
          </div>

          <div class="progress-bar" aria-hidden="true">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </section>

        <div class="calendar-toolbar">
          <button
            type="button"
            id="prevDateButton"
            class="calendar-icon-button"
            aria-label="이전 날짜 보기"
          >
            ‹
          </button>

          <div class="calendar-center">
            <button
              type="button"
              id="calendarViewTrigger"
              class="calendar-view-trigger"
              aria-expanded="false"
              aria-haspopup="true"
            >
              <span id="currentDateLabel" class="current-date-label"></span>
              <span id="currentViewTypeLabel" class="current-view-type-label"
                >일별</span
              >
            </button>

            <div
              id="calendarViewMenu"
              class="calendar-view-menu"
              role="menu"
              hidden
            >
              <button
                type="button"
                class="calendar-menu-button active"
                data-view="daily"
                role="menuitem"
              >
                일별 보기
              </button>
              <button
                type="button"
                class="calendar-menu-button"
                data-view="monthly"
                role="menuitem"
              >
                월별 보기
              </button>
            </div>
          </div>

          <button
            type="button"
            id="nextDateButton"
            class="calendar-icon-button"
            aria-label="다음 날짜 보기"
          >
            ›
          </button>

          <button
            type="button"
            id="goTodayButton"
            class="calendar-today-button"
          >
            오늘
          </button>
        </div>

        <section class="input-section" aria-labelledby="input-title">
          <form id="todoForm" class="todo-form">
            <div class="form-group">
              <label for="todoInput" class="form-label">제목</label>
              <input
                type="text"
                id="todoInput"
                class="todo-input"
                placeholder="할 일을 입력해줘"
                autocomplete="off"
              />
            </div>

            <div class="form-group">
              <label for="categorySelect" class="form-label">카테고리</label>
              <select id="categorySelect" class="category-select">
                <option value="개인">개인</option>
                <option value="업무">업무</option>
                <option value="공부">공부</option>
              </select>
            </div>

            <button type="submit" id="submitButton" class="submit-button">
              추가
            </button>
          </form>
        </section>

        <section class="list-section" aria-labelledby="list-title">
          <div class="list-header">
            <h2 id="list-title" class="section-title">할 일 목록</h2>
            <span id="todoCount" class="todo-count-badge">총 0개</span>
          </div>

          <div class="filter-wrap">
            <div class="filter-group">
              <button
                type="button"
                class="filter-button active"
                data-filter="all"
              >
                전체
              </button>
              <button
                type="button"
                class="filter-button"
                data-filter="completed"
              >
                완료
              </button>
              <button
                type="button"
                class="filter-button"
                data-filter="incomplete"
              >
                미완료
              </button>
            </div>

            <div
              id="activeCategoryFilter"
              class="active-category-filter"
              style="display: none"
            >
              <span id="activeCategoryText" class="active-category-text"></span>
              <button
                type="button"
                id="clearCategoryFilter"
                class="clear-category-filter"
              >
                ✕
              </button>
            </div>
          </div>

          <p id="emptyMessage" class="empty-message">
            등록된 할 일이 없습니다.
          </p>

          <ul id="todoList" class="todo-list" aria-live="polite"></ul>
        </section>
      </section>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
