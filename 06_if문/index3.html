<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>if(제3형식)</title>
  </head>
  <body>
    <script>
      // if(조건식){ 제 3형식
      //     참일때 실행
      // }else if(조건식){
      //     참일때 실행
      // }else if(조건식){
      //     참일때 실행
      // }else if(조건식){
      //     참일때 실행
      // }else{
      //     거짓일때
      // }
      //   외부로부터 데이터를 입력 받아서 국어,영어,수학,컴퓨터 점수"
      //   총점과 평균을 구하고
      // 평균이 90점 이상이면 "수"
      // 평균이 80점 이상이면 "우"
      // 평균이 70점 이상이면 "미"
      // 평균이 60점 이상이면 "양"
      // 나머지는 "가"
      let kor = Number(prompt("국어점수를 입력하세요"));
      let eng = Number(prompt("영어점수를 입력하세요"));
      let mat = Number(prompt("수학점수를 입력하세요"));
      let com = Number(prompt("컴퓨터점수를 입력하세요"));
      //   총점 구하기 + nuber 숫자처리
      let tot = Number(kor) + Number(eng) + Number(mat) + Number(com);
      //   평균 구하기
      let avg = tot / 4;
      //   평점 구하기
      let remark = "";
      if (avg >= 90) {
        remark = "수";
      } else if (avg >= 80) {
        remark = "우";
      } else if (avg >= 70) {
        remark = "미";
      } else if (avg >= 60) {
        remark = "양";
      } else {
        remark = "가";
      }
      // 학점 구하기
      let rem = "";
      if (avg >= 98) {
        rem = "A+";
      } else if (avg >= 90) {
        rem = "A";
      } else if (avg >= 85) {
        rem = "B+";
      } else if (avg >= 80) {
        rem = "B";
      } else if (avg >= 75) {
        rem = "C+";
      } else if (avg >= 70) {
        rem = "C";
      } else if (avg >= 65) {
        rem = "D+";
      } else if (avg >= 60) {
        rem = "D";
      } else {
        rem = "F";
      }
      let nai = prompt("나이를 입력하세요(0~100)");
      if (nai >= 19) {
        alert("성인입니다");
      } else {
        alert("미성년자");
      }
      let yag = prompt("숫자를 입력하세요(-0~100)");
      if (yag >= 0) {
        alert("양수입니다.");
      } else {
        alert("음수입니다.");
      }
      document.write(`국어점수=${kor}<br>`);
      document.write(`영어점수=${eng}<br>`);
      document.write(`수학점수=${mat}<br>`);
      document.write(`컴퓨터점수=${com}<br>`);
      document.write(`총점=${tot}<br>`);
      document.write(`평균=${avg}<br>`);
      document.write(`평점=${remark}<br>`);
      document.write(`학점=${rem}<br>`);
    </script>
  </body>
</html>
