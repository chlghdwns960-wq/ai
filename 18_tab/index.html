<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tab</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <section>
      <div class="inner">
        <h2>BRAND</h2>
        <p>
          건강하고 창의적인 미래를 만들기 위한 삼양식품의 다양한 브랜드를
          소개합니다.
        </p>

        <!-- tab 메뉴 -->
        <ul class="tab">
          <li class="on"><a href="#">삼양1963</a></li>
          <li><a href="#">삼양라면</a></li>
          <li><a href="#">불닭볶음면</a></li>
        </ul>

        <!-- 삼양1963 리스트 -->
        <div class="list_wrap">
          <ul class="list">
            <li>
              <a href="#">
                <img src="./images/Samyang1963/img.png" alt="삼양1963" />
                <h3>삼양1963</h3>
              </a>
            </li>
          </ul>
        </div>

        <!-- 삼양라면 리스트 -->
        <div class="list_wrap list_wrap2">
          <ul class="list">
            <li>
              <a href="#">
                <img src="./images/samyang/img1.png" alt="삼양라면" />
                <h3>삼양라면</h3>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./images/samyang/img2.png" alt="큰컵삼양라면" />
                <h3>큰컵삼양라면</h3>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./images/samyang/img3.png" alt="삼양라면 매운맛" />
                <h3>삼양라면 매운맛</h3>
              </a>
            </li>
            <li>
              <a href="#">
                <img
                  src="./images/samyang/img4.png"
                  alt="큰컵삼양라면 매운맛"
                />
                <h3>큰컵삼양라면 매운맛</h3>
              </a>
            </li>
          </ul>
        </div>

        <!-- 불닭볶음면 리스트 -->
        <div class="list_wrap list_wrap2">
          <ul class="list">
            <li>
              <a href="#">
                <img src="./images/bc/img1.png" alt="불닭볶음면" />
                <h3>불닭볶음면</h3>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./images/bc/img2.png" alt="까르보불닭볶음면" />
                <h3>까르보불닭볶음면</h3>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./images/bc/img3.png" alt="로제불닭볶음면" />
                <h3>로제불닭볶음면</h3>
              </a>
            </li>
            <li>
              <a href="#">
                <img src="./images/bc/img4.png" alt="불닭볶음탕면" />
                <h3>불닭볶음탕면</h3>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </section>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./js/jquery.js"></script>
  </body>
</html>
