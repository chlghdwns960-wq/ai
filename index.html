<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>CAMBAK Splash</title>
    <style>
      :root {
        --bg: #e9e9e9;
        --brand: #0d4fb3;
        --text: #0d4fb3;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 모바일 전용 프레임 */
      .app {
        position: relative;
        width: 100%;
        max-width: 430px;
        height: 100dvh;
        background: var(--bg);
        overflow: hidden;
      }

      .splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 24px;
      }

      .logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transform: translateY(-8px);
        animation: fadeUp 1s ease-out both;
      }

      .brand {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 0.5px;
        color: var(--text);
        line-height: 1;
      }

      .icon {
        width: min(36vw, 160px);
        height: auto;
        display: block;
      }

      .hint {
        position: absolute;
        left: 50%;
        bottom: max(22px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        font-size: 12px;
        color: rgba(13, 79, 179, 0.65);
        opacity: 0;
        animation: fadeIn 0.6s ease 1.2s forwards;
      }

      .next-screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        background: linear-gradient(180deg, #eef2f8 0%, #ffffff 100%);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.45s ease;
      }

      .next-screen.active {
        opacity: 1;
        pointer-events: auto;
      }

      .card {
        width: 100%;
        border-radius: 24px;
        background: white;
        padding: 28px 20px;
        box-shadow: 0 20px 50px rgba(16, 24, 40, 0.08);
      }

      .card h1 {
        margin: 0 0 10px;
        font-size: 28px;
        color: #16345f;
      }

      .card p {
        margin: 0;
        font-size: 15px;
        line-height: 1.65;
        color: #47617f;
      }

      .btn {
        margin-top: 20px;
        width: 100%;
        height: 52px;
        border: 0;
        border-radius: 16px;
        background: var(--brand);
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(-8px);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @media (min-width: 431px) {
        body {
          background: #dcdcdc;
        }

        .app {
          border-radius: 28px;
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.16);
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="splash" id="splash">
        <div class="logo-wrap">
          <svg
            class="icon"
            viewBox="0 0 260 150"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="CAMBAK 로고"
          >
            <path
              d="M35 96C35 84 42 75 53 72L86 63L111 40C116 35 123 32 130 32H177L219 35C225 35 230 40 230 46V99H35V96Z"
              stroke="#0D4FB3"
              stroke-width="8"
              stroke-linejoin="round"
            />
            <path
              d="M52 72V61C52 55 57 50 63 50H106"
              stroke="#0D4FB3"
              stroke-width="8"
              stroke-linecap="round"
            />
            <path
              d="M108 50H144"
              stroke="#0D4FB3"
              stroke-width="8"
              stroke-linecap="round"
            />
            <rect
              x="91"
              y="58"
              width="32"
              height="23"
              rx="2"
              stroke="#0D4FB3"
              stroke-width="8"
            />
            <rect
              x="150"
              y="58"
              width="31"
              height="23"
              rx="2"
              stroke="#0D4FB3"
              stroke-width="8"
            />
            <path
              d="M62 80H85"
              stroke="#0D4FB3"
              stroke-width="8"
              stroke-linecap="round"
            />
            <circle cx="74" cy="108" r="17" stroke="#0D4FB3" stroke-width="8" />
            <circle
              cx="198"
              cy="108"
              r="17"
              stroke="#0D4FB3"
              stroke-width="8"
            />
            <path
              d="M215 76H230"
              stroke="#0D4FB3"
              stroke-width="8"
              stroke-linecap="round"
            />
            <path
              d="M36 99H230"
              stroke="#0D4FB3"
              stroke-width="8"
              stroke-linecap="round"
            />
          </svg>
          <div class="brand">CAMBAK</div>
        </div>
        <div class="hint">화면을 터치하면 시작돼</div>
      </section>

      <section class="next-screen" id="nextScreen">
        <div class="card">
          <h1>CAMBAK</h1>
          <p>
            업로드한 시안을 기준으로 모바일 전용 스플래시 화면을 먼저
            구현했어.<br />
            이 다음 단계에서는 홈, 로그인, 온보딩 같은 실제 앱 화면으로 확장하면
            돼.
          </p>
          <button class="btn" id="restartBtn">다시 보기</button>
        </div>
      </section>
    </main>

    <script>
      setTimeout(() => {
        window.location.href = "./work1.html";
      }, 3000);
    </script>
  </body>
</html>
