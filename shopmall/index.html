<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHJ - Premium Fashion</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="mobile-container">
      <header class="header">
        <div class="header-content">
          <h1 class="logo">CHJ</h1>
          <div class="header-icons">
            <button class="icon-btn" aria-label="검색" type="button">
              <i data-lucide="search"></i>
            </button>
            <a href="cart.html" class="icon-btn cart-btn" aria-label="장바구니">
              <i data-lucide="shopping-bag"></i>
              <span class="cart-badge">2</span>
            </a>
          </div>
        </div>
      </header>

      <main class="main-content">
        <section class="hero-banner">
          <div class="hero-image">
            <img
              src="https://images.unsplash.com/photo-1609565911206-04527a94436e?auto=format&fit=crop&w=1200&h=900&q=80"
              alt="봄 시즌 패션 컬렉션 배너"
            />
            <div class="hero-overlay">
              <div class="hero-text">
                <h2>Spring Collection</h2>
                <p>새로운 시즌을 위한 특별한 컬렉션</p>
              </div>
            </div>
          </div>
        </section>

        <section class="category-tabs">
          <div class="tabs-container">
            <button class="tab-btn active" data-category="전체" type="button">
              전체
            </button>
            <button class="tab-btn" data-category="아우터" type="button">
              아우터
            </button>
            <button class="tab-btn" data-category="상의" type="button">
              상의
            </button>
            <button class="tab-btn" data-category="하의" type="button">
              하의
            </button>
            <button class="tab-btn" data-category="원피스" type="button">
              원피스
            </button>
            <button class="tab-btn" data-category="가방" type="button">
              가방
            </button>
          </div>
        </section>

        <section class="product-section filtered-product-section">
          <div class="section-header">
            <h2 id="filtered-title">전체 상품</h2>
            <button class="more-btn" type="button">더보기</button>
          </div>
          <div class="product-grid" id="filtered-products"></div>
          <p class="empty-message" id="filtered-empty-message" hidden>
            해당 카테고리의 상품이 아직 준비되지 않았어요.
          </p>
        </section>
      </main>

      <nav class="bottom-tabbar">
        <a href="index.html" class="tab-item active" data-tab="home">
          <i data-lucide="home"></i>
          <span>홈</span>
        </a>
        <a href="category.html" class="tab-item" data-tab="category">
          <i data-lucide="grid-3x3"></i>
          <span>카테고리</span>
        </a>
        <a href="cart.html" class="tab-item" data-tab="cart">
          <i data-lucide="shopping-bag"></i>
          <span>장바구니</span>
        </a>
        <a href="mypage.html" class="tab-item" data-tab="mypage">
          <i data-lucide="user"></i>
          <span>마이</span>
        </a>
      </nav>
    </div>

    <script src="./Script/script.js"></script>
  </body>
</html>
