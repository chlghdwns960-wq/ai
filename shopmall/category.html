<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카테고리 - CHIC</title>
    <link rel="stylesheet" href="./css/style.css" />
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <!-- 모바일 컨테이너 -->
    <div class="mobile-container">
      <!-- 헤더 -->
      <header class="header">
        <div class="header-content">
          <a href="index.html" class="logo">CHIC</a>
          <div class="header-icons">
            <button class="icon-btn" aria-label="검색">
              <i data-lucide="search"></i>
            </button>
            <a href="cart.html" class="icon-btn cart-btn" aria-label="장바구니">
              <i data-lucide="shopping-bag"></i>
              <span class="cart-badge">2</span>
            </a>
          </div>
        </div>
      </header>

      <!-- 메인 컨텐츠 -->
      <main class="main-content">
        <div class="page-title">
          <h1>카테고리</h1>
        </div>

        <!-- 카테고리 리스트 -->
        <section class="category-list">
          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="sparkles"></i>
            </div>
            <div class="category-list-info">
              <h3>신상품</h3>
              <p>새로 입고된 상품</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="trending-up"></i>
            </div>
            <div class="category-list-info">
              <h3>베스트</h3>
              <p>인기 많은 상품</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="shirt"></i>
            </div>
            <div class="category-list-info">
              <h3>아우터</h3>
              <p>코트, 재킷, 가디건</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="wind"></i>
            </div>
            <div class="category-list-info">
              <h3>상의</h3>
              <p>블라우스, 셔츠, 티셔츠</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="scissors"></i>
            </div>
            <div class="category-list-info">
              <h3>하의</h3>
              <p>팬츠, 스커트, 청바지</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="flower-2"></i>
            </div>
            <div class="category-list-info">
              <h3>원피스</h3>
              <p>드레스, 롱원피스, 미니원피스</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="shopping-bag"></i>
            </div>
            <div class="category-list-info">
              <h3>가방</h3>
              <p>토트백, 크로스백, 클러치</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="gem"></i>
            </div>
            <div class="category-list-info">
              <h3>악세서리</h3>
              <p>목걸이, 귀걸이, 반지</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon">
              <i data-lucide="wallet"></i>
            </div>
            <div class="category-list-info">
              <h3>지갑 · 잡화</h3>
              <p>지갑, 벨트, 모자</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>

          <a href="#" class="category-list-item">
            <div class="category-list-icon special">
              <i data-lucide="tag"></i>
            </div>
            <div class="category-list-info">
              <h3>세일</h3>
              <p>최대 70% 할인</p>
            </div>
            <i data-lucide="chevron-right"></i>
          </a>
        </section>
      </main>

      <!-- 하단 탭바 -->
      <nav class="bottom-tabbar">
        <a href="index.html" class="tab-item" data-tab="home">
          <i data-lucide="home"></i>
          <span>홈</span>
        </a>
        <a href="category.html" class="tab-item active" data-tab="category">
          <i data-lucide="grid-3x3"></i>
          <span>카테고리</span>
        </a>
        <a href="cart.html" class="tab-item" data-tab="cart">
          <i data-lucide="shopping-bag"></i>
          <span>장바구니</span>
        </a>
        <a href="mypage.html" class="tab-item" data-tab="mypage">
          <i data-lucide="user"></i>
          <span>마이</span>
        </a>
      </nav>
    </div>

    <script src="/Script/script.js"></script>
  </body>
</html>
