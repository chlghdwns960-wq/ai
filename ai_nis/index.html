<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국가정보원 메인 비주얼</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="inner">
        <h2 class="headline">
          안전하고 평화로운 대한민국을 위해<br />
          국가정보원이 함께합니다.
        </h2>

        <ul class="card-list">
          <li class="card-item">
            <div class="card-image-wrap">
              <img src="./image/img1.jpg" alt="직무" class="card-image" />
            </div>
            <p class="card-title">직무</p>
          </li>

          <li class="card-item">
            <div class="card-image-wrap">
              <img
                src="./image/img2.jpg"
                alt="국정원 역사"
                class="card-image"
              />
            </div>
            <p class="card-title">국정원 역사</p>
          </li>

          <li class="card-item">
            <div class="card-image-wrap">
              <img src="./image/img3.jpg" alt="관련 법령" class="card-image" />
            </div>
            <p class="card-title">관련 법령</p>
          </li>
        </ul>
      </div>
    </section>
  </body>
</html>
