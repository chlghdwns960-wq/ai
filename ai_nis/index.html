<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>국가정보원 메인 비주얼</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        background: #000;
      }

      .hero {
        min-height: 100vh;
        background-image: url("./image/img4.jpg");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        position: relative;
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.14);
      }

      .inner {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1280px;
        margin: 0 auto;
        padding: 420px 40px 120px;
      }

      .headline {
        color: #ffffff;
        font-size: 50px;
        font-weight: 700;
        line-height: 75px;
        letter-spacing: -2.4px;
        max-width: 900px;
        margin-top: 0;
        margin-bottom: 50px;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.14);
      }

      .card-list {
        list-style: none;
        display: flex;
        gap: 39px;
        justify-content: flex-start;
        align-items: stretch;
        margin-top: 50px;
      }

      .card-item {
        width: 360px;
        border-radius: 10px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }

      .card-image-wrap {
        width: 100%;
        height: 230px;
        overflow: hidden;
        background: #e8e8e8;
      }

      .card-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #e8e8e8;
        transition: transform 0.45s ease;
        transform-origin: center center;
      }

      .card-item:hover .card-image {
        transform: scale(1.2, 1.1);
      }

      .card-title {
        background: #ffffff;
        color: #222222;
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        line-height: 1;
        padding: 19px 16px 18px;
      }

      @media (max-width: 1280px) {
        .inner {
          padding-top: 220px;
        }

        .headline {
          font-size: 52px;
          max-width: 760px;
        }

        .card-list {
          gap: 24px;
        }

        .card-item {
          width: calc((100% - 48px) / 3);
        }
      }

      @media (max-width: 920px) {
        .inner {
          padding: 160px 24px 80px;
        }

        .headline {
          font-size: 40px;
          letter-spacing: -1.5px;
          margin-bottom: 56px;
        }

        .card-list {
          flex-direction: column;
        }

        .card-item {
          width: 100%;
          max-width: 560px;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="inner">
        <h2 class="headline">
          안전하고 평화로운 대한민국을 위해<br />
          국가정보원이 함께합니다.
        </h2>

        <ul class="card-list">
          <li class="card-item">
            <div class="card-image-wrap">
              <img src="./image/img1.jpg" alt="직무" class="card-image" />
            </div>
            <p class="card-title">직무</p>
          </li>

          <li class="card-item">
            <div class="card-image-wrap">
              <img
                src="./image/img2.jpg"
                alt="국정원 역사"
                class="card-image"
              />
            </div>
            <p class="card-title">국정원 역사</p>
          </li>

          <li class="card-item">
            <div class="card-image-wrap">
              <img src="./image/img3.jpg" alt="관련 법령" class="card-image" />
            </div>
            <p class="card-title">관련 법령</p>
          </li>
        </ul>
      </div>
    </section>
  </body>
</html>
