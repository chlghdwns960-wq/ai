<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문서객체 선택 응용</title>
  </head>
  <body>
    <h1>회원명단</h1>
    <ul>
      <li>홍길동</li>
      <li>한만종</li>
      <li>김흥부</li>
      <li>이놀부</li>
      <li>정정화</li>
      <li>강인구</li>
    </ul>
    <script>
      let tit = document.querySelectorAll("ul li");
      console.log(tit);
      tit[0].style.fontSize = "24px";
      tit[0].style.background = "yellow";
      tit[1].style.color = "#fff";
      tit[1].style.background = "Orange";
      tit[1].style.listStyle = "none";

      tit[2].style.fontSize = "24px";
      tit[2].style.background = "yellow";
      tit[3].style.color = "#fff";
      tit[3].style.background = "Orange";
      tit[3].style.listStyle = "none";
      tit[4].style.fontSize = "24px";
      tit[4].style.background = "yellow";
      tit[5].style.color = "#fff";
      tit[5].style.background = "Orange";
      tit[5].style.listStyle = "none";
    </script>
  </body>
</html>
