<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>전국 캠핑장 검색</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <script>
      window.APP_CONFIG = {
        GOCAMPING_SERVICE_KEY:
          "bb4e376a3a8fb98ae9a09b56c35b3800a4dab631fbf24fa3e54b93d8d176af00",
        KAKAO_MAP_APP_KEY: "db9e577f9be8ad1e9a73a4f3d1b1bf7e",
        MOBILE_OS: "ETC",
        MOBILE_APP: "CampingSearchApp",
      };
    </script>
    <script src="./script/script.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="app-main">
        <section id="searchView" class="view is-active" aria-label="검색 화면">
          <div class="search-header search-header--home">
            <div class="search-input-wrap">
              <button
                class="search-button"
                id="openSearchResultBtn"
                aria-label="검색 실행"
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M10.5 18a7.5 7.5 0 1 1 0-15a7.5 7.5 0 0 1 0 15Z"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                  <path
                    d="m16 16 5 5"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
              </button>
              <input
                id="searchInput"
                type="text"
                placeholder="지역 또는 키워드를 입력하세요."
                autocomplete="off"
              />
              <button
                class="map-icon-button"
                id="quickMapBtn"
                aria-label="지도 보기"
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M3 6.5 8 4l8 2 5-2v13.5L16 20l-8-2-5 2V6.5Z"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M8 4v14M16 6v14"
                    stroke="currentColor"
                    stroke-width="1.8"
                  />
                </svg>
              </button>
            </div>
          </div>

          <section class="keyword-section">
            <div class="section-head">
              <h2>최근 검색어</h2>
              <button id="clearRecentBtn" class="text-button" type="button">
                수정
              </button>
            </div>
            <div id="recentKeywordList" class="chip-list"></div>
          </section>

          <section class="keyword-section">
            <div class="section-head">
              <h2>인기 키워드</h2>
            </div>
            <div
              id="popularKeywordList"
              class="chip-list chip-list--blue"
            ></div>
          </section>

          <section class="banner-card" aria-label="기획전 배너">
            <div class="banner-bear" aria-hidden="true">
              <div class="banner-bear-face"></div>
            </div>
            <div class="banner-overlay">
              <p class="banner-eyebrow">전국 캠핑장 검색</p>
              <h3>봄·여름 차박지 기획전</h3>
              <p>특별할인 장소 추천 리스트 확인</p>
            </div>
          </section>
        </section>

        <section id="resultView" class="view" aria-label="검색 결과 화면">
          <header class="topbar">
            <button
              id="backToSearchBtn"
              class="icon-button"
              aria-label="뒤로가기"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M15 5 8 12l7 7"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <h1>검색 결과</h1>
            <button
              id="toggleResultMapBtn"
              class="text-link-button"
              type="button"
            >
              지도
            </button>
          </header>

          <section class="result-filter-row">
            <button id="showAllBtn" class="filter-chip is-active" type="button">
              전체
            </button>
            <button id="showFavoritesBtn" class="filter-chip" type="button">
              즐겨찾기
            </button>
          </section>

          <section class="result-search-row">
            <div class="result-search-box">
              <button
                class="search-button"
                id="resultSearchBtn"
                aria-label="재검색"
              >
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path
                    d="M10.5 18a7.5 7.5 0 1 1 0-15a7.5 7.5 0 0 1 0 15Z"
                    stroke="currentColor"
                    stroke-width="2"
                  />
                  <path
                    d="m16 16 5 5"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </svg>
              </button>
              <input
                id="resultSearchInput"
                type="text"
                placeholder="지역 또는 캠핑장명을 검색하세요."
                autocomplete="off"
              />
            </div>
          </section>

          <section id="resultSummary" class="result-summary"></section>
          <section id="resultState" class="result-state"></section>
          <section id="resultList" class="result-list"></section>
          <section id="resultPagination" class="result-pagination"></section>
        </section>

        <section id="detailView" class="view" aria-label="상세 화면">
          <header class="topbar">
            <button
              id="backToResultBtn"
              class="icon-button"
              aria-label="뒤로가기"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M15 5 8 12l7 7"
                  stroke="currentColor"
                  stroke-width="2.2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <h1 id="detailTopTitle">캠핑장 상세</h1>
            <button
              id="openMapExternalBtn"
              class="text-link-button"
              type="button"
            >
              확장하기
            </button>
          </header>

          <section class="detail-hero-wrap">
            <img
              id="detailHeroImage"
              class="detail-hero-image"
              alt="캠핑장 대표 이미지"
            />
          </section>

          <section class="detail-card">
            <div class="detail-title-row">
              <div>
                <h2 id="detailTitle"></h2>
                <p id="detailAddress" class="detail-address"></p>
              </div>
              <button
                id="detailBookmarkBtn"
                class="bookmark-button"
                aria-label="저장"
              ></button>
            </div>

            <div class="detail-link-row">
              <button id="copyAddressBtn" class="link-action" type="button">
                주소 복사
              </button>
              <a
                id="homepageLink"
                class="link-action"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                >홈페이지</a
              >
              <a
                id="reservationLink"
                class="link-action"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
                >예약</a
              >
            </div>

            <div class="detail-chip-section">
              <h3>편의시설</h3>
              <div
                id="detailFacilityChips"
                class="chip-list chip-list--outline"
              ></div>
            </div>

            <div class="detail-chip-section">
              <h3>키워드</h3>
              <div id="detailKeywordChips" class="keyword-text"></div>
            </div>

            <div class="detail-info-grid" id="detailInfoGrid"></div>

            <div class="detail-description-block">
              <h3>소개</h3>
              <p id="detailDescription"></p>
            </div>

            <div class="detail-map-block">
              <div class="detail-block-head">
                <h3>지도</h3>
                <button id="recenterMapBtn" class="text-button" type="button">
                  현재 캠핑장 보기
                </button>
              </div>
              <div id="detailMap" class="detail-map"></div>
            </div>

            <div class="detail-related-block">
              <div class="detail-block-head">
                <h3>주변 추천 캠핑장</h3>
                <button id="showNearbyBtn" class="text-button" type="button">
                  새로고침
                </button>
              </div>
              <div id="nearbyList" class="nearby-list"></div>
            </div>
          </section>
        </section>
        <nav class="tab-bar" aria-label="하단 탭바">
          <button class="tab-item" type="button">
            <span class="tab-icon">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M5 12.5 12 6l7 6.5"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
            <span class="tab-label">홈</span>
          </button>

          <button class="tab-item is-active" id="tabSearchBtn" type="button">
            <span class="tab-icon">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle
                  cx="11"
                  cy="11"
                  r="6.5"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="m16 16 4 4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="tab-label">검색</span>
          </button>

          <button class="tab-item" type="button">
            <span class="tab-icon">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle
                  cx="8"
                  cy="10"
                  r="3"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <circle
                  cx="16"
                  cy="10"
                  r="3"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="M3.5 18c.8-2.6 3-4 5.5-4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <path
                  d="M15 14c2.5 0 4.7 1.4 5.5 4"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="tab-label">모임</span>
          </button>

          <button class="tab-item" type="button">
            <span class="tab-icon">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect
                  x="4"
                  y="6"
                  width="16"
                  height="12"
                  rx="2"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path d="m10 10 5 3-5 3v-6Z" fill="currentColor" />
              </svg>
            </span>
            <span class="tab-label">LIVE</span>
          </button>

          <button class="tab-item" type="button">
            <span class="tab-icon">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle
                  cx="12"
                  cy="8"
                  r="3.5"
                  stroke="currentColor"
                  stroke-width="2"
                />
                <path
                  d="M6.5 19c.9-3 3-4.5 5.5-4.5s4.6 1.5 5.5 4.5"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="tab-label">MY</span>
          </button>
        </nav>
      </main>
    </div>
  </body>
</html>
