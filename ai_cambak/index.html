<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>CAMBAK Splash</title>
    <link rel="stylesheet" href="./css/style2.css" />
  </head>
  <body>
    <main class="splash">
      <div class="splash__inner">
        <img src="./images/logo.png" alt="CAMBAK 로고" class="splash__logo" />

        <div class="loader" aria-label="로딩 중">
          <div class="loader__track">
            <div class="loader__bar" id="loaderBar"></div>
          </div>
          <p class="loader__text" id="loaderText">0%</p>
        </div>
      </div>
    </main>

    <script src="./script/script2.js"></script>
  </body>
</html>
