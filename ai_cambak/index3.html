<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>CAMBAK 로그인</title>
    <link rel="stylesheet" href="./css/style3.css" />
  </head>
  <body>
    <main class="app">
      <section class="login-screen" aria-label="캠박 로그인 화면">
        <h1 class="sr-only">CAMBAK 로그인</h1>

        <div class="logo-wrap">
          <img src="./images/logo.png" alt="CAMBAK 로고" class="logo-image" />
        </div>

        <form class="login-form" id="loginForm">
          <div class="field-group">
            <label for="userId" class="field-label">아이디</label>
            <input
              id="userId"
              name="userId"
              type="text"
              inputmode="text"
              autocomplete="username"
              placeholder=""
              class="field-input"
            />
          </div>

          <div class="field-group">
            <label for="userPassword" class="field-label">비밀번호</label>
            <input
              id="userPassword"
              name="userPassword"
              type="password"
              autocomplete="current-password"
              placeholder=""
              class="field-input"
            />
          </div>

          <div class="button-group">
            <a href="./index4.html" class="primary-button" id="loginButton"
              >로그인</a
            >
            <a href="https://example.com/signup" class="secondary-button"
              >회원가입</a
            >
          </div>

          <nav class="sub-links" aria-label="계정 관련 메뉴">
            <a href="https://example.com/find-id">아이디 찾기</a>
            <span class="divider" aria-hidden="true">|</span>
            <a href="https://example.com/find-password">비밀번호 찾기</a>
            <span class="divider" aria-hidden="true">|</span>
            <a href="https://example.com/back">둘러보기</a>
          </nav>

          <div class="social-login" aria-label="간편로그인 영역">
            <div class="social-title-wrap">
              <span class="social-line"></span>
              <p class="social-title">간편로그인</p>
              <span class="social-line"></span>
            </div>

            <div class="social-list">
              <a
                href="https://example.com/auth/kakao"
                class="social-item"
                aria-label="카카오로 로그인"
              >
                <img src="./images/kakao.png" alt="카카오 로그인" />
              </a>
              <a
                href="https://example.com/auth/naver"
                class="social-item"
                aria-label="네이버로 로그인"
              >
                <img src="./images/naver.png" alt="네이버 로그인" />
              </a>
              <a
                href="https://example.com/auth/google"
                class="social-item"
                aria-label="구글로 로그인"
              >
                <img src="./images/구글.png" alt="구글 로그인" />
              </a>
              <a
                href="https://example.com/auth/facebook"
                class="social-item"
                aria-label="페이스북으로 로그인"
              >
                <img src="./images/페이스북.png" alt="페이스북 로그인" />
              </a>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script src="./script/script3.js"></script>
  </body>
</html>
