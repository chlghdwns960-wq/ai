<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Layout</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="page">
      <div class="container">
        <section class="hero">
          <h2>COMMUNITY</h2>
          <p>
            삼양식품은 혁신적인 기술과 포용적인 사고로 여러분과 함께<br />
            새로운 식문화를 만들어갑니다.
          </p>
        </section>

        <ul class="social-list" aria-label="소셜 미디어 링크">
          <li>
            <a class="social-link facebook" href="#" aria-label="Facebook">
              <img src="./Image/icon.png" alt="페이스북 아이콘" />
            </a>
          </li>
          <li>
            <a class="social-link instagram" href="#" aria-label="Instagram">
              <img src="./Image/icon2.png" alt="인스타그램 아이콘" />
            </a>
          </li>
          <li>
            <a class="social-link blog" href="#" aria-label="Blog">
              <img src="./Image/icon3.png" alt="블로그 아이콘" />
            </a>
          </li>
          <li>
            <a class="social-link twitter" href="#" aria-label="Twitter">
              <img src="./Image/icon4.png" alt="트위터 아이콘" />
            </a>
          </li>
        </ul>

        <section class="grid">
          <div class="visual-card" aria-hidden="true"></div>

          <article class="card video-card">
            <h3>홍보영상</h3>
            <p>
              삼양식품의 다채로운 스토리를<br />
              영상으로 보여드립니다.
            </p>
            <a href="#" class="btn">자세히 보기</a>
          </article>

          <article class="card share-card">
            <h3>맛있는 나눔</h3>
            <p>모두가 행복한 맛있는 세상</p>
            <a href="#" class="btn">자세히 보기</a>
          </article>

          <article class="card notice-card">
            <h3>공지사항</h3>
            <p>삼양식품 개인정보취급방침 개정 안내</p>
            <a href="#" class="btn">자세히 보기</a>
          </article>

          <article class="card qna-card">
            <h3>고객 문의</h3>
            <p>
              삼양식품에게<br />
              여러분의 다양한 의견을 남겨주세요.
            </p>
            <a href="#" class="btn">자세히 보기</a>
          </article>

          <article class="card mall-card">
            <h3>삼양식품 공식몰</h3>
            <p>
              삼양식품의<br />
              다양한 제품을 만나보세요.
            </p>
            <a href="#" class="btn">자세히 보기</a>
          </article>
        </section>
      </div>
    </div>
  </body>
</html>
