<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Header Desktop</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 100%;
        min-width: 1440px;
        background: #ffffff;
        font-family: Arial, Helvetica, sans-serif;
        color: #1f1f1f;
      }

      .header {
        width: 100%;
        height: 80px;
        background: #ffffff;
        border-bottom: 1px solid #c8c8c8;
      }

      .header-inner {
        width: 1440px;
        height: 80px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      .brand-mark {
        position: relative;
        width: 28px;
        height: 28px;
        flex-shrink: 0;
      }

      .brand-mark::before,
      .brand-mark::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          linear-gradient(#d9764f 0 0) center/2px 100% no-repeat,
          linear-gradient(#d9764f 0 0) center/100% 2px no-repeat;
      }

      .brand-mark::after {
        transform: rotate(45deg);
      }

      .brand-name {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: -0.4px;
        color: #181818;
      }

      .nav {
        height: 100%;
        display: flex;
        align-items: center;
        gap: 42px;
        margin-left: 36px;
        margin-right: auto;
      }

      .nav-item {
        position: relative;
        height: 100%;
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: #333333;
        transition: color 0.2s ease;
      }

      .nav-item:hover {
        color: #d9764f;
      }

      .nav-item::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 3px;
        background: transparent;
        border-radius: 2px 2px 0 0;
        transition: background 0.2s ease;
      }

      .nav-item:hover::after {
        background: #d9764f;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-left: 36px;
        flex-shrink: 0;
      }

      .btn {
        height: 38px;
        padding: 0 20px;
        border: none;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.1px;
        cursor: pointer;
      }

      .btn-dark {
        background: #2d2b2a;
        color: #ffffff;
      }

      .btn-accent {
        background: #d98561;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <h1 class="brand-name">Claude</h1>
        </div>

        <nav class="nav" aria-label="메인 메뉴">
          <a href="#" class="nav-item">ABOUT</a>
          <a href="#" class="nav-item">PRODUCTS</a>
          <a href="#" class="nav-item">PARTERSHIP</a>
          <a href="#" class="nav-item">EDUCATION</a>
          <a href="#" class="nav-item">WHAT’S NEW</a>
          <a href="#" class="nav-item">SUPPORT</a>
        </nav>

        <div class="actions">
          <button class="btn btn-dark">매장찾기</button>
          <button class="btn btn-accent">글로드 마켓</button>
        </div>
      </div>
    </header>
  </body>
</html>
