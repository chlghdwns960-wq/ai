<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form데이터베이스 연결</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="formbox">
      <form action="" method="post" name="submit-to-google-sheet">
        <!-- 구글 sheet title 제목 -->
        <input type="text" placeholder="Your Name" name="Name" />
        <input type="email" placeholder="Your Email" name="Email" />
        <textarea name="Message" rows="6" placeholder="Your Message"></textarea>
        <input type="submit" value="Submit" class="btn" />
      </form>
      <!-- 전송 상황을 메시지로 뿌려주는 요소 -->
      <span id="msg"></span>
    </div>
  </body>
  <script>
    const scriptURL =
      "https://script.google.com/macros/s/AKfycbyJslRG1ED9zLCPiI1bm_SQWLJHwGrF92SkGLsTLuQQ1eQlqcJa-umzGSQk5yPt7ip5/exec"; // add your own app script link here
    const form = document.forms["submit-to-google-sheet"];
    const msg = document.getElementById("msg");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      fetch(scriptURL, { method: "POST", body: new FormData(form) })
        .then((response) => {
          msg.innerHTML = "Message sent successfully";
          setTimeout(function () {
            msg.innerHTML = "";
          }, 5000);
          form.reset();
        })
        .catch((error) => console.error("Error!", error.message));
    });
  </script>
</html>
