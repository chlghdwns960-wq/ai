<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card UI Box</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        background: #ffffff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px;
        color: #222;
      }

      .card {
        width: 350px;
        background: #ffffff;
        overflow: hidden;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease;
      }
      img {
        width: 100%;
        height: 260px;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      }

      .card-image {
        width: 100%;
        height: 260px;
        background: linear-gradient(135deg, #7aa7ff, #b8cbff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
      }

      .card-content {
        padding: 42px 0;
      }

      .card-title {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.3;
        color: #9c91c7;
        margin: 0 0 16px;
      }

      .card-text {
        font-size: 20px;
        line-height: 1.7;
        color: #111;
        font-weight: 700;
        letter-spacing: -1px;
        margin: 0 0 16px;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0;
        margin: 0;
        padding: 0;
      }

      .card-price {
        font-size: 24px;
        font-weight: 900;
        color: #111;
        margin: 0;
        padding: 0;
      }

      .card-price-unit {
        font-size: 16px;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-image"><img src="./imges/img1.jpg" alt="장가계" /></div>

      <div class="card-content">
        <h2 class="card-title">패키지</h2>
        <p class="card-text">
          [출발임박/Semi-프리미엄]장가계/원가계 5일#천문호쇼 #대협곡
          유리다리+...
        </p>

        <div class="card-footer">
          <strong class="card-price"
            >1,599,000<span class="card-price-unit">원~</span></strong
          >
        </div>
      </div>
    </div>
  </body>
</html>
