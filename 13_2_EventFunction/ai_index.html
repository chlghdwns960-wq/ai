<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript 애니메이션 관련 메서드</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px 10px;
        background: #ffffff;
        font-family: "맑은 고딕", sans-serif;
        color: #111;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 28px;
        font-weight: 700;
      }

      ol {
        margin: 0 0 20px 24px;
        padding: 0;
        font-size: 18px;
        line-height: 1.7;
      }

      .btn-group {
        margin-bottom: 20px;
      }

      .btn-group button {
        margin-right: 6px;
        margin-bottom: 6px;
        padding: 4px 10px;
        font-size: 14px;
        cursor: pointer;
      }

      .line {
        width: 100%;
        height: 1px;
        background: #9e9e9e;
        margin: 16px 0 10px;
      }

      /* 부모 박스 */
      .box-wrap,
      .box-row {
        width: 640px;
        height: 200px;
        background: #efefef;
        outline: 5px solid #c7c7c7; /* border 대신 outline 사용 */
        position: relative;
      }

      .box-wrap {
        display: flex;
        gap: 20px;
        margin-bottom: 50px;
      }

      /* 공통 자식 박스 */
      .box {
        width: 200px;
        height: 200px;
        padding: 6px;
        font-size: 18px;
        font-weight: 500;
        color: #000;
        border: 1px solid #bdbdbd;
        overflow: hidden;
        flex-shrink: 0;
      }

      .box1 {
        background: #ff120a;
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      .box2 {
        background: #008f00;
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      .box-empty {
        visibility: hidden;
      }

      .box3,
      .box4,
      .box5 {
        position: absolute;
        top: 0;
      }

      .box3 {
        left: 0;
        background: #ffcc00;
        opacity: 1;
        transition:
          height 0.5s ease,
          opacity 0.5s ease,
          padding-top 0.5s ease,
          padding-bottom 0.5s ease;
      }

      .box4 {
        left: 220px;
        background: #c8ff00;
        opacity: 1;
        transition:
          height 0.5s ease,
          opacity 0.5s ease,
          padding-top 0.5s ease,
          padding-bottom 0.5s ease;
      }

      .box5 {
        left: 440px;
        background: #1eb7df;
        z-index: 10;
        transition: left 0.7s ease;
      }

      .hidden-fade {
        opacity: 0;
        pointer-events: none;
      }

      .hidden-slide {
        height: 0;
        padding-top: 0;
        padding-bottom: 0;
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <h1>[ JavaScript 애니메이션 관련 메서드 ]</h1>

    <ol>
      <li>fadeIn()</li>
      <li>fadeOut()</li>
      <li>fadeToggle()</li>
      <li>slideUp()</li>
      <li>slideDown()</li>
      <li>slideToggle()</li>
      <li>animate()</li>
    </ol>

    <div class="btn-group">
      <button id="fadeInBtn">fadeIn</button>
      <button id="fadeOutBtn">fadeOut</button>
      <button id="fadeToggleBtn">fadeToggle</button>
      <button id="slideUpBtn">slideUp</button>
      <button id="slideDownBtn">slideDown</button>
      <button id="slideToggleBtn">slideToggle</button>
      <button id="ani1Btn">ani1</button>
      <button id="ani2Btn">ani2</button>
    </div>

    <div class="line"></div>

    <div class="box-wrap">
      <div class="box box1" id="box1">fadeIn / fadeOut</div>
      <div class="box box2" id="box2">fadeToggle</div>
      <div class="box box-empty"></div>
    </div>

    <div class="box-row">
      <div class="box box3" id="box3">slideUp / slideDown</div>
      <div class="box box4" id="box4">slideToggle</div>
      <div class="box box5" id="box5">Animation</div>
    </div>

    <script>
      const box1 = document.getElementById("box1");
      const box2 = document.getElementById("box2");
      const box3 = document.getElementById("box3");
      const box4 = document.getElementById("box4");
      const box5 = document.getElementById("box5");

      function fadeIn(element) {
        element.classList.remove("hidden-fade");
      }

      function fadeOut(element) {
        element.classList.add("hidden-fade");
      }

      function toggleFade(element) {
        if (element.classList.contains("hidden-fade")) {
          fadeIn(element);
        } else {
          fadeOut(element);
        }
      }

      function slideUp(element) {
        element.classList.add("hidden-slide");
      }

      function slideDown(element) {
        element.classList.remove("hidden-slide");
      }

      function toggleSlide(element) {
        if (element.classList.contains("hidden-slide")) {
          slideDown(element);
        } else {
          slideUp(element);
        }
      }

      function ani1(element) {
        element.style.left = "900px";
      }

      function ani2(element) {
        element.style.left = "440px";
      }

      document
        .getElementById("fadeInBtn")
        .addEventListener("click", function () {
          fadeIn(box1);
        });

      document
        .getElementById("fadeOutBtn")
        .addEventListener("click", function () {
          fadeOut(box1);
        });

      document
        .getElementById("fadeToggleBtn")
        .addEventListener("click", function () {
          toggleFade(box2);
        });

      document
        .getElementById("slideUpBtn")
        .addEventListener("click", function () {
          slideUp(box3);
        });

      document
        .getElementById("slideDownBtn")
        .addEventListener("click", function () {
          slideDown(box3);
        });

      document
        .getElementById("slideToggleBtn")
        .addEventListener("click", function () {
          toggleSlide(box4);
        });

      document.getElementById("ani1Btn").addEventListener("click", function () {
        ani1(box5);
      });

      document.getElementById("ani2Btn").addEventListener("click", function () {
        ani2(box5);
      });
    </script>
  </body>
</html>
