<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form응용문제1</title>
    <link rel="stylesheet" href="./css/style2.css" />
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>개인정보</legend>
        <ol>
          <li>
            <label for="name">이름</label>
            <input type="text" class="name" name="name" id="name" />
          </li>
          <li>
            <label for="email">메일주소</label>
            <input type="text" class="" name="email" id="email" />
          </li>
        </ol>
      </fieldset>
      <fieldset>
        <legend>로그인정보</legend>
        <ol>
          <li>
            <label for="id">아이디</label>
            <input type="text" class="id" name="id" id="id" />
          </li>
          <li>
            <label for="fw">비밀번호</label>
            <input type="password" class="" name="fw" id="fw" />
          </li>
        </ol>
      </fieldset>
    </form>
  </body>
</html>
