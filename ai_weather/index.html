<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제주도 자전거 여행 앱</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="app">
      <main class="main-content">
        <section class="hero-section">
          <div class="hero-card">
            <div class="hero-slider" id="heroSlider">
              <div class="hero-slide active">
                <img
                  class="hero-image"
                  src="./images/box1/img1.png"
                  alt="제주 풍경 1"
                />
              </div>
              <div class="hero-slide">
                <img
                  class="hero-image"
                  src="./images/box1/img2.png"
                  alt="제주 풍경 2"
                />
              </div>
              <div class="hero-slide">
                <img
                  class="hero-image"
                  src="./images/box1/img3.png"
                  alt="제주 풍경 3"
                />
              </div>
            </div>

            <div class="hero-overlay">
              <span class="hero-badge">JEJU BICYCLE TRIP</span>
              <h1>풍경 좋은 제주도<br />자전거와 함께</h1>
              <p class="hero-subtext">
                바람 좋은 길 위에서 제주를 천천히 만나는 여행
              </p>
            </div>
          </div>
        </section>

        <section class="info-grid">
          <div class="weather-card">
            <div class="weather-top">
              <p class="weather-label">현재 날씨</p>
              <p class="weather-status" id="weatherStatus">날씨 불러오는 중</p>
            </div>
            <div class="weather-bottom">
              <div class="weather-temp-wrap">
                <p class="weather-temp" id="weatherTemp">--°</p>
                <p class="weather-location" id="weatherLocation">
                  현재 위치 확인 중
                </p>
              </div>
              <div class="weather-icon" id="weatherIcon">☀️</div>
            </div>
          </div>

          <div class="small-cards">
            <div class="small-card">
              <div class="small-card-left">
                <span class="small-label">완주 코스</span>
                <span class="small-sub">오늘 추천 코스</span>
              </div>
              <span class="small-value">1/10</span>
            </div>

            <div class="small-card">
              <div class="small-card-left">
                <span class="small-label">이동거리</span>
                <span class="small-sub">예상 라이딩</span>
              </div>
              <span class="small-value">15km</span>
            </div>
          </div>
        </section>

        <section class="guide-section">
          <div class="section-head">
            <h2 class="section-title">제주도 자전거 여행정보 가이드</h2>
            <p class="section-desc">
              풍경이 좋은 코스와 뷰포인트를 가볍게 둘러봐
            </p>
          </div>

          <div class="slider-wrap">
            <div class="slider-track" id="sliderTrack">
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1581852017103-68ac65514cf7?auto=format&fit=crop&w=600&q=80"
                  alt="제주 오름"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1512100356356-de1b84283e18?auto=format&fit=crop&w=600&q=80"
                  alt="제주 마을 풍경"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80"
                  alt="제주 자연 풍경"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=600&q=80"
                  alt="제주 해안"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=600&q=80"
                  alt="산책길"
                />
              </div>

              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1581852017103-68ac65514cf7?auto=format&fit=crop&w=600&q=80"
                  alt="제주 오름"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1512100356356-de1b84283e18?auto=format&fit=crop&w=600&q=80"
                  alt="제주 마을 풍경"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80"
                  alt="제주 자연 풍경"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=600&q=80"
                  alt="제주 해안"
                />
              </div>
              <div class="slide-item">
                <img
                  src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=600&q=80"
                  alt="산책길"
                />
              </div>
            </div>
          </div>
        </section>

        <section class="content-section">
          <div class="section-head">
            <h2 class="section-title">제주도 자전거 여행정보 가이드</h2>
            <p class="section-desc">
              여행 코스, 패키지, 라이딩 무드를 한 번에 보기
            </p>
          </div>

          <div class="content-cards">
            <article class="content-card">
              <img
                src="https://images.unsplash.com/photo-1541625602330-2277a4c46182?auto=format&fit=crop&w=900&q=80"
                alt="자전거"
              />
            </article>

            <article class="content-card overlay-card">
              <img
                src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=900&q=80"
                alt="해변 자전거"
              />
              <div class="overlay-text">
                <p>제주도 자전거 여행 패키지</p>
                <strong>첫번째 코스 이야기</strong>
              </div>
            </article>

            <article class="content-card">
              <img
                src="https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=900&q=80"
                alt="라이딩"
              />
            </article>

            <article class="content-card">
              <img
                src="https://images.unsplash.com/photo-1507035895480-2b3156c31fc8?auto=format&fit=crop&w=900&q=80"
                alt="일몰 자전거"
              />
            </article>
          </div>
        </section>
