<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진달래 꽃</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, #fffafc 0%, #fff1f6 100%);
      color: #2b1f24;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #f3d7e2;
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 16px 40px rgba(118, 62, 88, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      text-align: center;
      color: #333333;
      letter-spacing: -0.03em;
    }

    h2 {
      margin: 0 0 32px;
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      text-align: right;
      font-weight: 500;
      color: #6f4b59;
    }

    .poem {
      display: grid;
      gap: 20px;
    }

    p {
      margin: 0;
      padding: 18px 20px;
      background: #fff8fb;
      border-radius: 16px;
      border: 1px solid #f5dfe8;
      line-height: 1.9;
      font-size: 1.1rem;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>진달래 꽃</h1>
    <h2>지은이:김소월</h2>

    <section class="poem">
      <p>나 보기가
역겨워 
가실때에는</p>

      <p>말 없이
고이
보내 드리오리다</p>

      <p>영변에 
약산
진달래 꽃</p>

      <p>진달래
진달래 꽃
피웠네</p>
    </section>
  </main>
</body>
</html>
