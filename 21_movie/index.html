<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>동영상 삽입</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1>홍보/마케팅 동영상</h1>
    <hr />
    <!-- 이미지 삽입 -->
    <div class="imgbox">
      <img src="./images/s1.png" alt="샘플이미지" />
    </div>
    <!-- 동영상 삽입 -->
    <div class="movi_wrap">
      <div class="movi">
        <!-- video 태그 -->
        <!-- loop는 반복 실행 -->
        <!-- controls 동영상 플레이어 -->
        <video autoplay muted loop controls>
          <source src="./movi/sample1.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="movi">
        <video autoplay muted loop controls>
          <source src="./movi/sample2.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="movi">
        <video autoplay muted loop controls>
          <source src="./movi/sample3.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="movi">
        <video autoplay muted loop controls>
          <source src="./movi/sample4.mp4" type="video/mp4" />
        </video>
      </div>
    </div>
    <!-- 유튜브 영상 삽입 -->
    <div class="youtube">
      <iframe
        src="https://www.youtube.com/embed/oyCgVDf7p7c?si=4xxvMNemXkCBAEj6"
        title="YouTube video player"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </div>
  </body>
</html>
