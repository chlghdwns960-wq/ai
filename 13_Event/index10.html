<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클릭이벤트</title>
    <style>
      .box {
        width: 646px;
        display: flex;
        gap: 20px;
      }
      .box div {
        width: 200px;
        height: 200px;
        border: 1px solid black;
      }
      .orange {
        background: orange;
      }
      .lightblue {
        background: lightblue;
      }
      .lightpink {
        background: lightpink;
      }
    </style>
  </head>
  <body>
    <h1>자바스크립트 함수</h1>
    <button id="btn1">숨김</button>
    <button id="btn2">보이기</button>
    <button id="btn3">토글</button>
    <button id="btn4">늘리기</button>
    <button id="btn5">줄이기</button>
    <hr />
    <div class="box">
      <div class="orange">보이기/숨기기</div>
      <div class="lightblue">토글</div>
      <div class="lightpink">가로/세로크기</div>
    </div>

    <script>
      // 버튼 1
      let btn1 = document.getElementById("btn1");
      //   버튼2
      let btn2 = document.getElementById("btn2");
      //   박스1
      let box1 = document.querySelector(".box .orange");
      //   버튼1 클릭 이벤트
      btn1.addEventListener("click", function () {
        box1.style.display = "none";
      });
      // 버튼2 클릭 이벤트
      btn2.addEventListener("click", function () {
        box1.style.display = "block";
      });
      //   Toggle
      //   버튼
      let btn3 = document.getElementById("btn3");
      //   박스
      let bluebox = document.querySelector(".box .lightblue");
      //   토글버튼을 클릭하면 on/off
      btn3.addEventListener("click", function () {
        if (bluebox.style.display == "none") {
          // 참일때
          bluebox.style.display = "block";
        } else {
          // 거짓일때
          bluebox.style.display = "none";
        }
      });

      //   버튼4 = 박스가 커지는 효과
      let btn4 = document.getElementById("btn4");
      let pinkbox = document.querySelector(".box .lightpink");
      //   박스크기 늘리는 이벤트
      btn4.addEventListener("click", function () {
        pinkbox.style.width = "600px";
        pinkbox.style.height = "600px";
      });
      let btn5 = document.getElementById("btn5");
      btn5.addEventListener("click", function () {
        pinkbox.style.width = "200px";
        pinkbox.style.height = "200px";
      });
    </script>
  </body>
</html>
