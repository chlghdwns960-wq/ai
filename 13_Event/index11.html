<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>제이쿼리</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <h1>제이쿼리 함수</h1>
    <button id="btn1">숨김</button>
    <button id="btn2">보이기</button>
    <button id="btn3">토글</button>
    <button id="btn4">늘리기</button>
    <button id="btn5">줄이기</button>
    <hr />
    <div class="box">
      <div class="orange">보이기/숨기기</div>
      <div class="lightblue">토글</div>
      <div class="lightpink">가로/세로크기</div>
    </div>
    <!-- 스크립트 라이브러리 연결(jquery 라이브러리) -->
    <script src="./script/jquery-4.0.0.js"></script>

    <script>
      // jquery 준비 작업
      $(function () {
        // css 제어
        $("#btn1").css({ width: "100px", height: "200px" });
        // 숨김버튼
        $("#btn1").click(function () {
          $(".orange").hide();
        });

        // 보이기 버튼
        $("#btn2").click(function () {
          $(".orange").show();
        });

        // 토글 버튼
        $("#btn3").click(function () {
          $(".lightblue").toggle();
        });

        // 늘리기
        $("#btn4").click(function () {
          $(".lightpink").width(600);
          $(".lightpink").height(600);
        });

        // 줄이기
        $("#btn5").click(function () {
          $(".lightpink").width(200);
          $(".lightpink").height(200);
        });
      });
    </script>
  </body>
</html>
