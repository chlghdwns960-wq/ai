      // 1~50까지 안녕하세요 반복문
      for (let i = 2; i <= 10; i += 2) {
        document.write(`안녕하세요 ${i} <br>`);
      }
      document.write("<hr>");
      //   1~20까지 반대로 출력하는 프로그램 20,19,18,17
      for (let j = 20; j >= 1; j--) {
        document.write(`안녕하세요 ${j} <br>`);
      }
      document.write("<hr>");
      //   3단을 출력하는 구구단 프로그램
      for (let k = 1; k <= 9; k++) {
        document.write(`3*${k}=${3 * k} <br>`);
      }
